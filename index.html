<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سامانه فاتحه آنلاین بختیاری</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/vazirmatn-font@5.0.1/Vazirmatn-font-face.css" rel="stylesheet" />
    <style>
        body { font-family: 'Vazirmatn', sans-serif; background: #0a0a0a; color: #e5e5e5; }
        .gold-text { color: #d4af37; }
        .bg-gold { background-color: #d4af37; }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <header class="p-4 flex justify-between items-center border-b border-zinc-800">
        <h1 class="text-lg font-black gold-text">فاتحه آنلاین</h1>
    </header>

    <div id="home-view" class="flex-1 p-6 space-y-6">
        <div class="bg-zinc-900 p-5 rounded-2xl border border-zinc-700 space-y-3">
            <h2 class="text-xs gold-text font-bold">ثبت رایگان مراسم:</h2>
            <input type="text" id="user-name" placeholder="نام و نام خانوادگی مرحوم" class="w-full bg-black border border-zinc-700 p-3 rounded-xl text-xs">
            <input type="text" id="user-card" placeholder="شماره کارت جهت دریافت سرباره" class="w-full bg-black border border-zinc-700 p-3 rounded-xl text-xs">
            <button onclick="registerMurasim()" class="w-full bg-gold text-black font-bold py-3 rounded-xl text-xs">ثبت و انتشار رایگان</button>
