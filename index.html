<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سامانه فاتحه آنلاین</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Scheherazade+New:wght@400;700&display=swap');
        body { font-family: 'Scheherazade New', serif; background: #0f172a; color: #e2e8f0; }
        .gold-text { color: #c5a059; }
        .bg-gold { background-color: #c5a059; }
        .page { display: none; }
        .page.active { display: block; }
        .mosque-frame { border: 2px solid #c5a059; background: rgba(30, 41, 59, 0.7); }
    </style>
</head>
<body class="pb-24">

    <header class="p-8 border-b border-zinc-800 text-center">
        <h1 class="text-3xl font-bold gold-text">مجلس یادبود</h1>
        <p class="text-sm mt-2 opacity-70">سامانه تسلیت و سرباره آنلاین</p>
    </header>

    <div id="page-list" class="page active p-6 space-y-4">
        <div id="murasim-list" class="space-y-4"></div>
    </div>

    <div id="page-login" class="page p-6 space-y-4">
        <input type="text" id="phone" placeholder="شماره موبایل" class="w-full bg-slate-900 p-3 rounded-lg border border-zinc-700 text-center">
        <button onclick="handleLogin()" class="w-full bg-gold text-black py-3 rounded-lg font-bold">ورود به حساب</button>
    </div>

    <div id="panel-admin" class="page p-6 space-y-4">
        <h2 class="text-gold-text text-xl font-bold">پنل مدیریت مسجد</h2>
        <div class="bg-slate-900 p-4 rounded-lg">
            <p class="text-xs">تعداد کل تراکنش‌ها:</p>
            <p id="total-tx" class="text-2xl font-bold gold-text">0</p>
        </div>
        <input type="text" id="m-name" placeholder="نام مرحوم" class="w-full bg-slate-900 p-3 rounded">
        <input type="text" id="m-card" placeholder="شماره کارت" class="w-full bg-slate-900 p-3 rounded">
        <button onclick="adminAddMurasim()" class="w-full bg-green-800 py-3 rounded font-bold">ثبت مجلس جدید</button>
        <div id="admin-transactions-list" class="space-y-2 mt-4 text-xs"></div>
        <button onclick="logout()" class="w-full bg-red-900 py-2 rounded text-xs">خروج</button>
    </div>

    <div id="panel-user" class="page p-6 space-y-4">
        <h2 class="text-xl gold-text font-bold">پروفایل کاربری</h2>
        <input type="text" id="user-name" placeholder="نام و نام خانوادگی" class="w-full bg-slate-900 p-3 rounded">
        <input type="text" id="user-city" placeholder="شهر" class="w-full bg-slate-900 p-3 rounded">
        <button onclick="saveProfile()" class="w-full bg-gold text-black py-3 rounded font-bold">ذخیره پروفایل</button>
    </div>

    <div id="page-payment" class="page p-6 text-center space-y-4">
        <button onclick="showPage('page-list')" class="text-xs text-zinc-500">← بازگشت</button>
        <h2 id="pay-name" class="text-2xl gold-text font-bold"></h2>
        <div class="mosque-frame p-8 rounded-lg">
            <p class="text-sm">شماره کارت جهت اهدای سرباره:</p>
            <p id="pay-card" class="text-2xl font-bold my-4 text-gold-text"></p>
            <input type="text" id="payer-name" placeholder="نام پرداخت‌کننده" class="w-full bg-black p-3 mb-2 text-center rounded border border-zinc-700">
            <input type="text" id="bank-receipt" placeholder="کد پیگیری فیش بانکی" class="w-full bg-black p-3 mb-4 text-center rounded border border-zinc-700">
            <button onclick="processPayment()" class="w-full bg-gold text-black py-3 rounded font-bold">ثبت واریزی</button>
        </div>
    </div>

    <audio id="quran-player" loop><source src="https://www.islamic-audios.com/quran/001.mp3" type="audio/mpeg"></audio>

    <nav class="fixed bottom-0 w-full bg-slate-900 border-t border-zinc-700 p-4 flex justify-around">
        <button onclick="showPage('page-list')">مجالس</button>
        <button onclick="showPage('page-login')">حساب من</button>
        <button onclick="toggleAudio()" class="gold-text">🔊 صدا</button>
    </nav>

    <script>
        const player = document.getElementById('quran-player');
        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'page-payment') player.play(); else player.pause();
        }
        function toggleAudio() { player.paused ? player.play() : player.pause(); }
        
        function handleLogin() {
            let phone = document.getElementById('phone').value;
            if(phone === "09964677831") showPage('panel-admin');
            else showPage('panel-user');
        }

        function adminAddMurasim() {
            let db = JSON.parse(localStorage.getItem('db') || "[]");
            db.push({ name: document.getElementById('m-name').value, card: document.getElementById('m-card').value });
            localStorage.setItem('db', JSON.stringify(db));
            location.reload();
        }

        function processPayment() {
            let txs = JSON.parse(localStorage.getItem('transactions') || "[]");
            txs.push({ 
                name: document.getElementById('payer-name').value, 
                murasimName: document.getElementById('pay-name').innerText,
                receipt: document.getElementById('bank-receipt').value,
                date: new Date().toLocaleDateString('fa-IR')
            });
            localStorage.setItem('transactions', JSON.stringify(txs));
            alert("واریزی شما ثبت شد.");
            showPage('page-list');
        }

        function saveProfile() {
            localStorage.setItem('profile', JSON.stringify({name: document.getElementById('user-name').value}));
            alert("ذخیره شد.");
        }

        function logout() { location.reload(); }

        // لود لیست
        let db = JSON.parse(localStorage.getItem('db') || "[]");
        document.getElementById('murasim-list').innerHTML = db.map(m => `
            <div onclick="document.getElementById('pay-name').innerText='${m.name}'; document.getElementById('pay-card').innerText='${m.card}'; showPage('page-payment')" 
            class="mosque-frame p-6 text-center cursor-pointer">
                <h3 class="text-xl font-bold gold-text">${m.name}</h3>
            </div>`).join('');

        // نمایش تراکنش‌ها برای ادمین
        let txs = JSON.parse(localStorage.getItem('transactions') || "[]");
        document.getElementById('total-tx').innerText = txs.length;
        document.getElementById('admin-transactions-list').innerHTML = txs.map(t => `
            <div class="bg-slate-800 p-2 rounded">
                ${t.name} - فیش: ${t.receipt}
            </div>`).join('');
    </script>
</body>
</html>
