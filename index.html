<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سامانه فاتحه آنلاین</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/vazirmatn-font@5.0.1/Vazirmatn-font-face.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Vazirmatn', sans-serif; background: #0a0a0a; color: #e5e5e5; }
        .gold-text { color: #d4af37; }
        .bg-gold { background-color: #d4af37; }
        /* مدیریت نمایش صفحات */
        .page { display: none; }
        .page.active { display: block; }
    </style>
</head>
<body class="pb-24">

    <header class="p-6 border-b border-zinc-800 text-center">
        <h1 class="text-xl font-black gold-text">فاتحه آنلاین بختیاری</h1>
    </header>

    <div id="page-list" class="page active p-6">
        <h2 class="text-sm text-zinc-400 mb-4">مراسم‌های فعال:</h2>
        <div id="murasim-list" class="space-y-3">
            </div>
    </div>

    <div id="page-login" class="page p-6 space-y-4">
        <h2 class="text-lg font-bold">ورود به سامانه</h2>
        <input type="text" id="phone-input" placeholder="شماره موبایل" class="w-full bg-zinc-900 p-3 rounded-xl border border-zinc-700">
        <button onclick="handleLogin()" class="w-full bg-gold text-black font-bold py-3 rounded-xl">ورود / ثبت‌نام</button>
    </div>

    <div id="panel-admin" class="page p-6">
        <h2 class="text-lg text-red-500 font-bold">پنل مدیریت</h2>
        <p class="text-xs mt-2">خوش آمدید ادمین. تمامی دسترسی‌ها فعال است.</p>
        <button onclick="logout()" class="mt-4 w-full bg-zinc-800 py-3 rounded-xl text-sm">خروج</button>
    </div>

    <div id="panel-owner" class="page p-6 space-y-4">
        <h2 class="text-lg text-green-500 font-bold">پنل صاحب‌عزا</h2>
        <input type="text" id="m-name" placeholder="نام مرحوم" class="w-full bg-zinc-900 p-3 rounded-xl">
        <input type="text" id="m-card" placeholder="شماره کارت" class="w-full bg-zinc-900 p-3 rounded-xl">
        <button onclick="createMurasim()" class="w-full bg-green-700 py-3 rounded-xl">ثبت مراسم جدید</button>
        <button onclick="logout()" class="w-full bg-zinc-800 py-3 rounded-xl text-sm">خروج</button>
    </div>

    <div id="panel-user" class="page p-6">
        <h2 class="text-lg text-blue-500 font-bold">پروفایل کاربری</h2>
        <p class="text-xs mt-2">شما به عنوان کاربر وارد شده‌اید.</p>
        <button onclick="logout()" class="mt-4 w-full bg-zinc-800 py-3 rounded-xl text-sm">خروج</button>
    </div>

    <nav class="fixed bottom-0 w-full bg-zinc-900 border-t border-zinc-800 p-3 flex justify-around">
        <button onclick="showPage('page-list')" class="flex flex-col items-center text-[10px] text-zinc-500"><i class="fa-solid fa-house"></i>خانه</button>
        <button onclick="showPage('page-login')" class="flex flex-col items-center text-[10px] text-zinc-500"><i class="fa-solid fa-user"></i>ورود</button>
    </nav>

    <script>
        // سوئیچ بین صفحات
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }

        // منطق ورود
        function handleLogin() {
            let phone = document.getElementById('phone-input').value;
            if (!phone) return;

            if (phone === "09964677831") {
                showPage('panel-admin');
            } else {
                let isOwner = confirm("آیا می‌خواهید مراسم ثبت کنید؟ (تایید برای صاحب‌عزا)");
                showPage(isOwner ? 'panel-owner' : 'panel-user');
            }
        }

        // ثبت مراسم
        function createMurasim() {
            let name = document.getElementById('m-name').value;
            let card = document.getElementById('m-card').value;
            if(name && card) {
                let db = JSON.parse(localStorage.getItem('db')) || [];
                db.push({ name, card });
                localStorage.setItem('db', JSON.stringify(db));
                alert("مراسم ثبت شد!");
                location.reload();
            }
        }

        function logout() { location.reload(); }

        // لود لیست مراسم
        let db = JSON.parse(localStorage.getItem('db')) || [];
        let listEl = document.getElementById('murasim-list');
        if(db.length === 0) {
            listEl.innerHTML = '<p class="text-zinc-600 text-xs">مراسمی یافت نشد.</p>';
        } else {
            listEl.innerHTML = db.map(m => `
                <div class="bg-zinc-900 p-4 rounded-xl border border-zinc-700">
                    <h3 class="font-bold gold-text">${m.name}</h3>
                    <p class="text-[10px] text-zinc-500">کارت: ${m.card}</p>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
<div id="page-list" class="page active p-6">
    <h2 class="text-sm text-zinc-400 mb-4">مراسم‌های فعال (جهت پرداخت سرباره کلیک کنید):</h2>
    <div id="murasim-list" class="space-y-3"></div>
</div>

<div id="page-payment" class="page p-6 space-y-4">
    <button onclick="showPage('page-list')" class="text-xs text-zinc-500">← بازگشت به لیست</button>
    <h2 id="pay-name" class="text-xl font-bold gold-text"></h2>
    <div class="bg-zinc-900 p-6 rounded-xl border border-zinc-700 text-center">
        <p class="text-sm">شماره کارت جهت واریز سرباره:</p>
        <p id="pay-card" class="text-2xl font-bold my-4 tracking-widest"></p>
        <input type="text" placeholder="نام پرداخت کننده" class="w-full bg-black p-3 rounded-xl mb-2 text-center">
        <button onclick="alert('اطلاعات واریزی شما با موفقیت ثبت شد.')" class="w-full bg-gold text-black font-bold py-3 rounded-xl">ثبت واریزی</button>
    </div>
</div>

<script>
    // اصلاح تابع نمایش مراسم‌ها برای اضافه کردن قابلیت کلیک
    function renderList() {
        let db = JSON.parse(localStorage.getItem('db')) || [];
        let listEl = document.getElementById('murasim-list');
        
        listEl.innerHTML = db.map((m, index) => `
            <div onclick="openPayment(${index})" class="bg-zinc-900 p-4 rounded-xl border border-zinc-700 cursor-pointer hover:border-gold-text transition">
                <h3 class="font-bold">${m.name}</h3>
                <p class="text-[10px] text-zinc-500">کلیک برای پرداخت سرباره</p>
            </div>
        `).join('');
    }

    // تابع باز کردن صفحه پرداخت
    function openPayment(index) {
        let db = JSON.parse(localStorage.getItem('db'));
        document.getElementById('pay-name').innerText = db[index].name;
        document.getElementById('pay-card').innerText = db[index].card;
        showPage('page-payment');
    }

    // فراخوانی در شروع کار
    renderList();
</script>
