<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فاتحه آنلاین</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/vazirmatn-font@5.0.1/Vazirmatn-font-face.css" rel="stylesheet" />
    <style>
        body { font-family: 'Vazirmatn', sans-serif; background: #0a0a0a; color: #e5e5e5; }
        .gold-text { color: #d4af37; }
        .bg-gold { background-color: #d4af37; }
        .bg-maroon { background-color: #4a0404; }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <!-- هدر -->
    <header class="p-4 flex justify-between items-center border-b border-zinc-800">
        <h1 class="text-lg font-black gold-text">فاتحه آنلاین</h1>
        <button onclick="toggleMenu()" class="text-2xl gold-text">☰</button>
    </header>

    <!-- منوی همبرگری -->
    <div id="menu" class="hidden absolute top-16 right-4 w-48 bg-zinc-900 border border-zinc-700 rounded-xl p-4 z-50">
        <ul class="space-y-4 text-xs">
            <li>صفحه اصلی</li>
            <li>مدیریت مراسم</li>
            <li>تماس با پشتیبانی</li>
        </ul>
    </div>

    <!-- محتوای اصلی -->
    <div class="flex-1 p-6 space-y-6">
        <!-- کارت ثبت سرباره -->
        <div class="bg-zinc-900 p-5 rounded-2xl border border-zinc-800">
            <h2 class="gold-text font-bold text-sm mb-4">ثبت کمک مالی (سرباره)</h2>
            <input type="text" id="donor-name" placeholder="نام و نام خانوادگی خیر" class="w-full bg-black border border-zinc-700 p-3 rounded-xl text-xs mb-3">
            <input type="text" id="donor-ref" placeholder="کد پیگیری واریزی" class="w-full bg-black border border-zinc-700 p-3 rounded-xl text-xs mb-3">
            <button onclick="registerDonation()" class="w-full bg-zinc-800 hover:bg-zinc-700 text-white font-bold py-2 rounded-xl text-xs">ثبت در لیست خیرین</button>
        </div>
    </div>

    <!-- دکمه‌های پایین صفحه -->
    <div class="p-6 bg-zinc-900 rounded-t-3xl border-t border-zinc-700 space-y-3">
        <button onclick="alert('لطفاً مبلغ ۸۰,۰۰۰ تومان به کارت ۶۲۱۹۸۶۱۴۳۵۶۵۰۲۸۷ به نام حمیدرضا سعیدی واریز کنید.')" class="w-full bg-gold text-black font-bold py-3 rounded-xl text-xs">
            <span>+ ثبت مراسم جدید (۸۰ هزار تومان)</span>
        </button>
        <button onclick="window.open('https://wa.me/989964677831', '_blank')" class="w-full bg-maroon text-white font-bold py-3 rounded-xl text-xs flex items-center justify-center gap-2">
            <span>📞 تایید واریزی توسط ادمین</span>
        </button>
        <p class="text-[10px] text-center text-zinc-500 pt-2">مدیریت: حمیدرضا سعیدی</p>
    </div>

    <script>
        function toggleMenu() {
            document.getElementById('menu').classList.toggle('hidden');
        }

        function registerDonation() {
            const name = document.getElementById('donor-name').value;
            const ref = document.getElementById('donor-ref').value;
            if(name && ref) {
                alert("نام " + name + " با کد پیگیری " + ref + " با موفقیت ثبت شد.");
            } else {
                alert("لطفاً نام و کد پیگیری را وارد کنید.");
            }
        }
    </script>
</body>
</html>
