  <!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فاتحه آنلاین بختیاری</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/vazirmatn-font@5.0.1/Vazirmatn-font-face.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Vazirmatn', sans-serif; background: #0a0a0a; color: #e5e5e5; }
        .gold-text { color: #d4af37; }
        .bg-gold { background-color: #d4af37; }
        .nav-btn { display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 10px; color: #71717a; }
    </style>
</head>
<body class="pb-24">

    <header class="p-4 border-b border-zinc-800 text-center">
        <h1 class="text-lg font-black gold-text">سامانه فاتحه آنلاین</h1>
    </header>

    <div id="page-list" class="p-6">
        <h2 class="text-sm text-zinc-400 mb-4">مراسم‌های در حال برگزاری</h2>
        <div id="murasim-list" class="space-y-3"></div>
    </div>

    <div id="page-auth" class="hidden p-6 space-y-4">
        <h2 class="text-lg font-bold">ورود صاحب‌عزا</h2>
        <input type="text" id="phone" placeholder="شماره موبایل" class="w-full bg-zinc-900 p-3 rounded-xl border border-zinc-700">
        <input type="text" id="m-name" placeholder="نام مرحوم" class="w-full bg-zinc-900 p-3 rounded-xl border border-zinc-700">
        <input type="text" id="m-card" placeholder="شماره کارت" class="w-full bg-zinc-900 p-3 rounded-xl border border-zinc-700">
        <button onclick="saveMurasim()" class="w-full bg-gold text-black font-bold py-3 rounded-xl">ثبت و انتشار مراسم</button>
    </div>

    <div id="page-rules" class="hidden p-6 text-xs leading-6 text-zinc-400">
        <h2 class="text-gold-text font-bold mb-2">قوانین و مقررات</h2>
        <p>۱. تمامی اطلاعات توسط کاربران ثبت می‌شود.<br>۲. این سامانه مسئولیتی در قبال تراکنش‌های مالی ندارد.<br>۳. رعایت احترام متوفی الزامی است.</p>
    </div>

    <nav class="fixed bottom-0 w-full bg-zinc-900 border-t border-zinc-800 p-3 flex justify-around">
        <button onclick="showPage('page-list')" class="nav-btn"><i class="fa-solid fa-house"></i>خانه</button>
        <button onclick="showPage('page-auth')" class="nav-btn"><i class="fa-solid fa-user-pen"></i>ثبت مراسم</button>
        <button onclick="showPage('page-rules')" class="nav-btn"><i class="fa-solid fa-gavel"></i>قوانین</button>
    </nav>

    <script>
        let murasims = JSON.parse(localStorage.getItem('db')) || [];

        function showPage(pageId) {
            document.getElementById('page-list').classList.add('hidden');
            document.getElementById('page-auth').classList.add('hidden');
            document.getElementById('page-rules').classList.add('hidden');
            document.getElementById(pageId).classList.remove('hidden');
        }

        function saveMurasim() {
            let name = document.getElementById('m-name').value;
            let card = document.getElementById('m-card').value;
            if(name && card) {
                murasims.push({ id: Date.now(), name, card });
                localStorage.setItem('db', JSON.stringify(murasims));
                alert("مراسم با موفقیت ثبت شد.");
                location.reload();
            }
        }

        // نمایش لیست اولیه
        document.getElementById('murasim-list').innerHTML = murasims.map(m => `
            <div class="bg-zinc-900 p-4 rounded-xl border border-zinc-700">
                <h3 class="font-bold">${m.name}</h3>
                <p class="text-[10px] text-zinc-500 font-mono">کارت: ${m.card}</p>
            </div>
        `).join('');
    </script>
</body>
</html>
