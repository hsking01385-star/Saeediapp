<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فاتحه آنلاین</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/vazirmatn-font@5.0.1/Vazirmatn-font-face.css" rel="stylesheet" />
    <style>
        body { font-family: 'Vazirmatn', sans-serif; background: #0a0a0a; color: #e5e5e5; }
        .gold-text { color: #d4af37; }
        .bg-gold { background-color: #d4af37; }
        .bg-maroon { background-color: #4a0404; }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <header class="p-4 flex justify-between items-center border-b border-zinc-800">
        <h1 class="text-lg font-black gold-text">فاتحه آنلاین</h1>
        <button onclick="adminLogin()" class="text-[10px] bg-zinc-800 px-3 py-1 rounded-lg">ورود ادمین</button>
    </header>

    <div id="main-view" class="flex-1 p-6 space-y-4">
        <h2 class="text-sm text-zinc-400 mb-4">ثبت مراسم توسط صاحب عزا:</h2>
        <div class="bg-zinc-900 p-5 rounded-2xl border border-zinc-700 space-y-3">
            <input type="text" id="user-name" placeholder="نام مرحوم" class="w-full bg-black border border-zinc-700 p-3 rounded-xl text-xs">
            <input type="text" id="user-card" placeholder="شماره کارت برای دریافت سرباره" class="w-full bg-black border border-zinc-700 p-3 rounded-xl text-xs">
            <button onclick="registerMurasim()" class="w-full bg-gold text-black font-bold py-3 rounded-xl text-xs">ثبت مراسم (۸۰ هزار تومان)</button>
        </div>
        
        <h2 class="text-sm text-zinc-400 mt-8">لیست مراسم‌های تایید شده:</h2>
        <div id="murasim-list" class="space-y-3"></div>
    </div>

    <!-- پنل ادمین مخفی -->
    <div id="admin-panel" class="hidden flex-1 p-6 space-y-4">
        <h2 class="gold-text font-bold">پنل مدیریت حمیدرضا سعیدی (تایید مراسم‌ها)</h2>
        <div id="admin-murasim-list" class="space-y-3"></div>
        <button onclick="location.reload()" class="w-full bg-zinc-800 py-3 rounded-xl text-xs">خروج</button>
    </div>

    <script>
        let murasims = JSON.parse(localStorage.getItem('murasim_db')) || [];

        function registerMurasim() {
            let name = document.getElementById('user-name').value;
            let card = document.getElementById('user-card').value;
            if(name && card) {
                alert("لطفاً ۸۰ هزار تومان واریز کنید. پس از بررسی ادمین، مراسم شما فعال می‌شود.");
                murasims.push({ id: Date.now(), name, card, status: 'pending' });
                localStorage.setItem('murasim_db', JSON.stringify(murasims));
                location.reload();
            }
        }

        function renderList() {
            // فقط نمایش مراسم‌های تایید شده برای عموم
            document.getElementById('murasim-list').innerHTML = murasims.filter(m => m.status === 'active').map(m => `
                <div class="bg-zinc-900 p-4 rounded-xl border border-emerald-900 text-center">
                    <h3 class="font-bold text-gold-text">${m.name}</h3>
                </div>
            `).join('');
        }

        function adminLogin() {
            let mobile = prompt("شماره:");
            let pass = prompt("رمز:");
            if (mobile === "09964677831" && pass === "1234a") {
                document.getElementById('main-view').classList.add('hidden');
                document.getElementById('admin-panel').classList.remove('hidden');
                
                document.getElementById('admin-murasim-list').innerHTML = murasims.map(m => `
                    <div class="bg-zinc-900 p-4 rounded-xl border border-zinc-700 flex justify-between items-center">
                        <div><h3 class="text-sm">${m.name}</h3></div>
                        ${m.status === 'pending' ? `<button onclick="approve('${m.id}')" class="bg-emerald-600 px-3 py-1 rounded text-xs">تایید مراسم</button>` : '<span class="text-emerald-500 text-xs">فعال</span>'}
                    </div>
                `).join('');
            }
        }

        function approve(id) {
            let m = murasims.find(x => x.id == id);
            m.status = 'active';
            localStorage.setItem('murasim_db', JSON.stringify(murasims));
            location.reload();
        }

        renderList();
    </script>
</body>
</html>
